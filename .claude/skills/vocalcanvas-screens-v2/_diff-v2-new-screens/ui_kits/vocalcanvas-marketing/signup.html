<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>免費註冊 · VocalCanvas</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/logo-mark.svg" />
  <link rel="stylesheet" href="marketing.css" />
</head>
<body data-screen-label="VocalCanvas — Sign up">

<div class="login-page">
  <aside class="login-brand">
    <a href="index.html" class="top" style="color: inherit;">
      <img src="../../assets/logo-mark.svg" width="36" height="36" alt="" />
      <span class="name">VocalCanvas</span>
    </a>

    <div>
      <h2>30 秒註冊，<br/>馬上產出你的第一個音檔。</h2>
      <p class="b-sub">免費版每月 30 分鐘音檔額度，6 款精選 AI 聲音任你挑。</p>

      <div class="login-wave" id="signup-wave"></div>

      <div style="display: flex; flex-direction: column; gap: 14px;">
        <div style="display: flex; align-items: center; gap: 12px; font-family: var(--font-body); font-size: 14px; color: rgba(255,252,247,0.9);">
          <span style="width: 28px; height: 28px; border-radius: 50%; background: rgba(255,90,60,0.2); color: var(--coral-300); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <svg width="14" height="14" viewBox="0 0 24 24" class="ico-stroke"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          每月 30 分鐘免費額度，不收信用卡
        </div>
        <div style="display: flex; align-items: center; gap: 12px; font-family: var(--font-body); font-size: 14px; color: rgba(255,252,247,0.9);">
          <span style="width: 28px; height: 28px; border-radius: 50%; background: rgba(255,90,60,0.2); color: var(--coral-300); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <svg width="14" height="14" viewBox="0 0 24 24" class="ico-stroke"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          多語言朗讀（中文、英文、日文）
        </div>
        <div style="display: flex; align-items: center; gap: 12px; font-family: var(--font-body); font-size: 14px; color: rgba(255,252,247,0.9);">
          <span style="width: 28px; height: 28px; border-radius: 50%; background: rgba(255,90,60,0.2); color: var(--coral-300); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <svg width="14" height="14" viewBox="0 0 24 24" class="ico-stroke"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          隨時可以升級 Pro，也隨時可以取消
        </div>
      </div>
    </div>

    <div style="font-family: var(--font-body); font-size: 12px; color: rgba(255,252,247,0.5);">
      © 2026 VocalCanvas · Made in Taiwan
    </div>
  </aside>

  <main class="login-form">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 32px;">
      <div class="lang-switch">
        <button class="active">中文</button>
        <button>English</button>
      </div>
    </div>

    <div class="login-form-inner">
      <h1>建立帳號</h1>
      <p class="sub">免費開始，產出你的第一個音檔。</p>

      <div class="oauth-row">
        <button class="oauth-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.6 8.4 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.6l6.2 5.2C41.4 35.5 44 30.1 44 24c0-1.3-.1-2.4-.4-3.5z"/>
          </svg>
          使用 Google 註冊
        </button>
        <button class="oauth-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#06C755"/><path fill="#fff" d="M19.5 10.7c0-3.36-3.37-6.1-7.5-6.1s-7.5 2.74-7.5 6.1c0 3.01 2.67 5.53 6.28 6.01.24.05.58.16.66.36.07.18.05.47.02.66l-.11.64c-.03.18-.15.74.65.4.8-.33 4.31-2.54 5.88-4.35 1.08-1.19 1.62-2.4 1.62-3.72z"/></svg>
          使用 LINE 註冊
        </button>
      </div>

      <div class="divider"><span>或使用 Email</span></div>

      <form onsubmit="event.preventDefault();">
        <div class="field">
          <label for="name">姓名</label>
          <input type="text" id="name" placeholder="你的名字" autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">密碼</label>
          <input type="password" id="password" placeholder="至少 8 個字元" autocomplete="new-password" />
          <span style="font-family: var(--font-body); font-size: 12px; color: var(--fg-3); margin-top: 2px;">至少 8 個字元，包含英文與數字</span>
        </div>
        <label class="checkbox-row" style="margin: 16px 0 20px;">
          <input type="checkbox" />
          <span>我同意 <a href="#" class="forgot" style="text-decoration: underline;">使用條款</a> 與 <a href="#" class="forgot" style="text-decoration: underline;">隱私政策</a></span>
        </label>
        <button type="submit" class="btn btn-render submit-btn">建立帳號</button>
      </form>

      <div class="signup-row">
        已經有帳號？
        <a href="login.html">登入</a>
      </div>
    </div>
  </main>
</div>

<script>
  const wave = document.getElementById('signup-wave');
  const heights = [];
  for (let i = 0; i < 22; i++) {
    const h = 30 + Math.sin(i * 0.4) * 22 + Math.sin(i * 0.2) * 14;
    heights.push(Math.max(14, Math.min(72, Math.round(h))));
  }
  wave.innerHTML = heights.map((h, i) => `<span style="height: ${h}px; animation-delay: ${i * 0.07}s;"></span>`).join('');

  document.querySelectorAll('.lang-switch button').forEach(b => {
    b.addEventListener('click', () => {
      b.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });
</script>

</body>
</html>
