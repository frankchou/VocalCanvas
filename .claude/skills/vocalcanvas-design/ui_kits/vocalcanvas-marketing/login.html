<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登入 · VocalCanvas</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/logo-mark.svg" />
  <link rel="stylesheet" href="marketing.css" />
</head>
<body data-screen-label="VocalCanvas — Login">

<div class="login-page">
  <!-- ============ LEFT: BRAND ============ -->
  <aside class="login-brand">
    <a href="index.html" class="top" style="color: inherit;">
      <img src="../../assets/logo-mark.svg" width="36" height="36" alt="" />
      <span class="name">VocalCanvas</span>
    </a>

    <div>
      <h2>歡迎回來。<br/>讓你的文字繼續發聲。</h2>
      <p class="b-sub">登入後，繼續編輯你的作品、產出新音檔、管理你收藏的聲音。</p>

      <div class="login-wave" id="login-wave"></div>

      <div class="login-quote">
        「我用 VocalCanvas 為我的 podcast 開場做了 12 個版本 — 換個聲音、換個停頓位置，立刻就能比較。比錄音棚快太多。」
        <div class="author">— Mia C. · podcast 創作者</div>
      </div>
    </div>

    <div style="font-family: var(--font-body); font-size: 12px; color: rgba(255,252,247,0.5);">
      © 2026 VocalCanvas · Made in Taiwan
    </div>
  </aside>

  <!-- ============ RIGHT: FORM ============ -->
  <main class="login-form">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 32px;">
      <div class="lang-switch">
        <button class="active" data-lang="zh">中文</button>
        <button data-lang="en">English</button>
      </div>
    </div>

    <div class="login-form-inner">
      <h1 data-zh="登入" data-en="Sign in">登入</h1>
      <p class="sub" data-zh="使用你的帳號繼續創作" data-en="Use your account to keep creating">使用你的帳號繼續創作</p>

      <!-- OAuth -->
      <div class="oauth-row">
        <button class="oauth-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.6 8.4 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.6l6.2 5.2C41.4 35.5 44 30.1 44 24c0-1.3-.1-2.4-.4-3.5z"/>
          </svg>
          <span data-zh="使用 Google 繼續" data-en="Continue with Google">使用 Google 繼續</span>
        </button>
        <button class="oauth-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24"><rect width="24" height="24" rx="5" fill="#06C755"/><path fill="#fff" d="M19.5 10.7c0-3.36-3.37-6.1-7.5-6.1s-7.5 2.74-7.5 6.1c0 3.01 2.67 5.53 6.28 6.01.24.05.58.16.66.36.07.18.05.47.02.66l-.11.64c-.03.18-.15.74.65.4.8-.33 4.31-2.54 5.88-4.35 1.08-1.19 1.62-2.4 1.62-3.72zM9.36 12.65H7.87c-.22 0-.4-.18-.4-.4V9.27c0-.22.18-.4.4-.4.22 0 .4.18.4.4v2.58h1.1c.22 0 .4.18.4.4-.01.22-.18.4-.41.4zm1.66-.4c0 .22-.18.4-.4.4-.22 0-.4-.18-.4-.4V9.27c0-.22.18-.4.4-.4.22 0 .4.18.4.4v2.98zm3.55 0c0 .17-.11.32-.27.38-.04.01-.09.02-.13.02-.13 0-.25-.06-.32-.16l-1.52-2.07v1.83c0 .22-.18.4-.4.4-.22 0-.4-.18-.4-.4V9.27c0-.17.11-.32.27-.38.04-.01.09-.02.13-.02.13 0 .25.06.32.16l1.52 2.07V9.27c0-.22.18-.4.4-.4.22 0 .4.18.4.4v2.98zm2.39-1.89c.22 0 .4.18.4.4 0 .22-.18.4-.4.4h-1.1v.69h1.1c.22 0 .4.18.4.4 0 .22-.18.4-.4.4h-1.5c-.22 0-.4-.18-.4-.4V9.27c0-.22.18-.4.4-.4h1.5c.22 0 .4.18.4.4 0 .22-.18.4-.4.4h-1.1v.69h1.1z"/></svg>
          <span data-zh="使用 LINE 繼續" data-en="Continue with LINE">使用 LINE 繼續</span>
        </button>
        <button class="oauth-btn" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          <span data-zh="使用 Apple 繼續" data-en="Continue with Apple">使用 Apple 繼續</span>
        </button>
      </div>

      <div class="divider"><span data-zh="或使用 Email" data-en="or use email">或使用 Email</span></div>

      <form id="login-form" onsubmit="event.preventDefault();">
        <div class="field">
          <label for="email" data-zh="Email" data-en="Email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password" data-zh="密碼" data-en="Password">密碼</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="field-row">
          <label class="checkbox-row">
            <input type="checkbox" />
            <span data-zh="保持登入" data-en="Stay signed in">保持登入</span>
          </label>
          <a href="#" class="forgot" data-zh="忘記密碼？" data-en="Forgot password?">忘記密碼？</a>
        </div>
        <button type="submit" class="btn btn-render submit-btn" data-zh="登入" data-en="Sign in">登入</button>
      </form>

      <div class="signup-row">
        <span data-zh="還沒有帳號？" data-en="No account yet?">還沒有帳號？</span>
        <a href="#" data-zh="免費註冊" data-en="Sign up free">免費註冊</a>
      </div>

      <p class="legal">
        <span data-zh="登入即代表你同意我們的" data-en="By signing in, you agree to our">登入即代表你同意我們的</span>
        <a href="#" data-zh="使用條款" data-en="Terms">使用條款</a>
        <span data-zh="與" data-en="and">與</span>
        <a href="#" data-zh="隱私政策" data-en="Privacy Policy">隱私政策</a>。
      </p>
    </div>
  </main>
</div>

<script>
  // Login wave heights
  const wave = document.getElementById('login-wave');
  const heights = [];
  for (let i = 0; i < 22; i++) {
    const h = 30 + Math.sin(i * 0.5) * 22 + Math.sin(i * 0.18) * 14;
    heights.push(Math.max(14, Math.min(72, Math.round(h))));
  }
  wave.innerHTML = heights.map((h, i) => `<span style="height: ${h}px; animation-delay: ${i * 0.07}s;"></span>`).join('');

  // Language toggle
  function setLang(lang) {
    document.querySelectorAll('[data-zh]').forEach(el => {
      const t = lang === 'zh' ? el.dataset.zh : el.dataset.en;
      if (t) el.textContent = t;
    });
    document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en';
    document.title = lang === 'zh' ? '登入 · VocalCanvas' : 'Sign in · VocalCanvas';
    document.querySelector('.login-brand h2').innerHTML = lang === 'zh'
      ? '歡迎回來。<br/>讓你的文字繼續發聲。'
      : 'Welcome back.<br/>Keep giving voice to words.';
    document.querySelector('.login-brand .b-sub').textContent = lang === 'zh'
      ? '登入後，繼續編輯你的作品、產出新音檔、管理你收藏的聲音。'
      : "Once you're in, keep editing your takes, render new audio, and manage your saved voices.";
    document.querySelector('.login-quote').firstChild.textContent = lang === 'zh'
      ? '「我用 VocalCanvas 為我的 podcast 開場做了 12 個版本 — 換個聲音、換個停頓位置，立刻就能比較。比錄音棚快太多。」'
      : '"I made 12 versions of my podcast intro with VocalCanvas — swap a voice, move a pause, compare instantly. Way faster than a studio."';
  }

  document.querySelectorAll('.lang-switch button').forEach(b => {
    b.addEventListener('click', () => {
      b.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      setLang(b.dataset.lang);
    });
  });
</script>

</body>
</html>
