<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card tight">
  <div class="eyebrow">Warm secondaries · cream · amber · pink</div>
  <div style="font-family: var(--font-body); font-size: 12px; color: var(--fg-2);">Cream — light canvas</div>
  <div class="swatch-row" style="margin-top: -8px;">
    <div class="swatch on-light" style="background: var(--cream-50); border: 1px solid var(--line-1);"><div class="name">cream-50</div><div class="hex">#FFFCF7</div></div>
    <div class="swatch on-light" style="background: var(--cream-100);"><div class="name">100</div><div class="hex">#FBF6EC</div></div>
    <div class="swatch on-light" style="background: var(--cream-200);"><div class="name">200</div><div class="hex">#F4ECDA</div></div>
    <div class="swatch on-light" style="background: var(--cream-300);"><div class="name">300</div><div class="hex">#E9DEC4</div></div>
  </div>
  <div style="font-family: var(--font-body); font-size: 12px; color: var(--fg-2);">Amber — sunset energy</div>
  <div class="swatch-row" style="margin-top: -8px;">
    <div class="swatch on-light" style="background: var(--amber-300);"><div class="name">amber-300</div><div class="hex">#FFC785</div></div>
    <div class="swatch on-light" style="background: var(--amber-400);"><div class="name">400</div><div class="hex">#FFA94D</div></div>
    <div class="swatch" style="background: var(--amber-500);"><div class="name">500</div><div class="hex">#FF8A1F</div></div>
  </div>
  <div style="font-family: var(--font-body); font-size: 12px; color: var(--fg-2);">Pink — love, playful</div>
  <div class="swatch-row" style="margin-top: -8px;">
    <div class="swatch on-light" style="background: var(--pink-300);"><div class="name">pink-300</div><div class="hex">#FFB3C8</div></div>
    <div class="swatch on-light" style="background: var(--pink-400);"><div class="name">400</div><div class="hex">#FF85A8</div></div>
    <div class="swatch" style="background: var(--pink-500);"><div class="name">500</div><div class="hex">#F25C8A</div></div>
  </div>
</div></body></html>
