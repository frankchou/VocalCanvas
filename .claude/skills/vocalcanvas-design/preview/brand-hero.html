<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card dark" style="background-image: var(--grad-canvas);">
  <div class="eyebrow" style="color: var(--coral-300);">Brand motif · waveform as canvas</div>
  <div style="display: flex; gap: 24px; align-items: center;">
    <div style="flex: 1;">
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 36px; line-height: 1.05; color: var(--cream-50); letter-spacing: -0.02em;">
        Paint with <span style="background: var(--grad-sunset); -webkit-background-clip: text; background-clip: text; color: transparent;">your voice</span>.
      </div>
      <div style="font-family: var(--font-body); font-size: 14px; color: rgba(255,252,247,0.75); margin-top: 10px; max-width: 360px;">
        AI-rendered narration with the warmth of a real voice. Multilingual, on demand.
      </div>
    </div>
    <div style="flex: 0 0 auto; display: flex; align-items: center; gap: 4px; height: 100px;">
      <style>
        .bwave { width: 4px; border-radius: 2px; background: var(--coral-500); animation: bwave 1.4s var(--ease-in-out) infinite; }
        @keyframes bwave { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
      </style>
      <script>
        const heights = [40,60,80,100,80,60,40,70,90,70,50,30,50,80,100,80,50,30];
        document.write(heights.map((h,i)=>`<div class="bwave" style="height:${h}px; animation-delay:${i*0.07}s"></div>`).join(''));
      </script>
    </div>
  </div>
</div></body></html>
