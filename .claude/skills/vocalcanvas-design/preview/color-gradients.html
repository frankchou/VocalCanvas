<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Signature gradient · the AI-touch moment</div>
  <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px;">
    <div style="height: 160px; border-radius: 24px; background: var(--grad-sunset); box-shadow: var(--shadow-glow); display: flex; align-items: flex-end; padding: 16px;">
      <div>
        <div style="font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.85);">--grad-sunset</div>
        <div style="font-family: var(--font-display); font-weight: 700; font-size: 20px; color: #FFFCF7; margin-top: 2px;">Render audio</div>
      </div>
    </div>
    <div style="height: 160px; border-radius: 24px; background: var(--grad-sunset-soft); display: flex; align-items: flex-end; padding: 14px;">
      <div>
        <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-700);">--grad-sunset-soft</div>
        <div style="font-family: var(--font-body); font-weight: 600; font-size: 14px; color: var(--ink-800); margin-top: 2px;">Hero glow</div>
      </div>
    </div>
    <div style="height: 160px; border-radius: 24px; background: var(--grad-aurora); display: flex; align-items: flex-end; padding: 14px;">
      <div>
        <div style="font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.9);">--grad-aurora</div>
        <div style="font-family: var(--font-body); font-weight: 600; font-size: 14px; color: #fff; margin-top: 2px;">Dark accents</div>
      </div>
    </div>
  </div>
  <div class="caption">Coral → pink → amber. Use for AI-render moments only. Aurora (violet → mint) is reserved for dark surfaces where coral would clash.</div>
</div></body></html>
