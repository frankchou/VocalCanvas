<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Shadow elevation · warm-tinted</div>
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; padding: 12px 0;">
    <div style="text-align: center;">
      <div style="height: 80px; background: #fff; border-radius: 14px; box-shadow: var(--shadow-xs);"></div>
      <div class="token" style="margin-top: 8px;">xs</div>
    </div>
    <div style="text-align: center;">
      <div style="height: 80px; background: #fff; border-radius: 14px; box-shadow: var(--shadow-sm);"></div>
      <div class="token" style="margin-top: 8px;">sm</div>
    </div>
    <div style="text-align: center;">
      <div style="height: 80px; background: #fff; border-radius: 14px; box-shadow: var(--shadow-md);"></div>
      <div class="token" style="margin-top: 8px;">md ★</div>
    </div>
    <div style="text-align: center;">
      <div style="height: 80px; background: #fff; border-radius: 14px; box-shadow: var(--shadow-lg);"></div>
      <div class="token" style="margin-top: 8px;">lg</div>
    </div>
    <div style="text-align: center;">
      <div style="height: 80px; background: #fff; border-radius: 14px; box-shadow: var(--shadow-xl);"></div>
      <div class="token" style="margin-top: 8px;">xl</div>
    </div>
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding-top: 8px;">
    <div style="display: flex; align-items: center; gap: 14px;">
      <div style="height: 56px; width: 56px; background: var(--coral-500); border-radius: var(--r-pill); box-shadow: var(--shadow-glow);"></div>
      <div>
        <div class="token">--shadow-glow</div>
        <div class="caption">Coral halo for primary AI CTA</div>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 14px;">
      <div style="height: 56px; width: 200px; background: var(--cream-100); border-radius: var(--r-md); box-shadow: var(--shadow-inner);"></div>
      <div>
        <div class="token">--shadow-inner</div>
        <div class="caption">Recessed slider track</div>
      </div>
    </div>
  </div>
</div></body></html>
