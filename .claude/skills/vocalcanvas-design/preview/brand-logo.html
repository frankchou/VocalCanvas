<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Logo lockups</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div style="background: var(--cream-50); border: 1px solid var(--line-1); border-radius: 18px; padding: 22px; display: flex; align-items: center; gap: 14px;">
      <img src="../assets/logo-mark.svg" width="56" height="56" />
      <div>
        <div style="font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; color: var(--ink-800);">VocalCanvas</div>
        <div class="caption">On cream · primary</div>
      </div>
    </div>
    <div style="background: var(--ink-700); border-radius: 18px; padding: 22px; display: flex; align-items: center; gap: 14px; background-image: var(--grad-canvas);">
      <img src="../assets/logo-mark.svg" width="56" height="56" />
      <div>
        <div style="font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; color: var(--cream-50);">VocalCanvas</div>
        <div style="font-family: var(--font-body); font-size: 12px; color: rgba(255,252,247,0.65);">On midnight · dark mode</div>
      </div>
    </div>
    <div style="background: #fff; border: 1px solid var(--line-1); border-radius: 18px; padding: 22px; display: flex; align-items: center; gap: 14px;">
      <img src="../assets/logo-mark-mono.svg" width="56" height="56" />
      <div>
        <div style="font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; color: var(--ink-800);">VocalCanvas</div>
        <div class="caption">Mono · single-tone for print &amp; small UI</div>
      </div>
    </div>
    <div style="background: var(--grad-sunset); border-radius: 18px; padding: 22px; display: flex; align-items: center; gap: 14px;">
      <div style="background: rgba(255,255,255,0.18); width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; gap: 3px; padding: 0 12px;">
        <svg viewBox="0 0 64 64" width="32" height="32"><g fill="#FFFCF7"><rect x="12" y="26" width="4" height="12" rx="2"/><rect x="20" y="18" width="4" height="28" rx="2"/><rect x="28" y="12" width="4" height="40" rx="2"/><rect x="36" y="20" width="4" height="24" rx="2"/><rect x="44" y="28" width="4" height="8" rx="2"/><rect x="52" y="22" width="4" height="20" rx="2"/></g></svg>
      </div>
      <div>
        <div style="font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; color: #FFFCF7;">VocalCanvas</div>
        <div style="font-family: var(--font-body); font-size: 12px; color: rgba(255,252,247,0.85);">Reversed on sunset · marketing</div>
      </div>
    </div>
  </div>
</div></body></html>
