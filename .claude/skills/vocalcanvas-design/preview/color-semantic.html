<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card tight">
  <div class="eyebrow">Semantic colors · system feedback</div>
  <div class="grid-4">
    <div style="background: var(--positive-soft); border: 1px solid var(--mint-300); border-radius: 12px; padding: 12px;">
      <div style="display: flex; align-items: center; gap: 8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--positive);"></span><b style="font-family:var(--font-body);font-size:13px;color:var(--mint-600);">Positive</b></div>
      <div class="token" style="margin-top: 6px;">#1FC68C</div>
      <div class="caption" style="margin-top: 2px;">Render complete</div>
    </div>
    <div style="background: var(--warning-soft); border: 1px solid var(--amber-300); border-radius: 12px; padding: 12px;">
      <div style="display: flex; align-items: center; gap: 8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--warning);"></span><b style="font-family:var(--font-body);font-size:13px;color:var(--amber-500);">Warning</b></div>
      <div class="token" style="margin-top: 6px;">#FF8A1F</div>
      <div class="caption" style="margin-top: 2px;">Long text alert</div>
    </div>
    <div style="background: var(--danger-soft); border: 1px solid #F5B5BA; border-radius: 12px; padding: 12px;">
      <div style="display: flex; align-items: center; gap: 8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--danger);"></span><b style="font-family:var(--font-body);font-size:13px;color:var(--danger);">Danger</b></div>
      <div class="token" style="margin-top: 6px;">#E5404E</div>
      <div class="caption" style="margin-top: 2px;">Render failed</div>
    </div>
    <div style="background: var(--info-soft); border: 1px solid var(--violet-300); border-radius: 12px; padding: 12px;">
      <div style="display: flex; align-items: center; gap: 8px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--info);"></span><b style="font-family:var(--font-body);font-size:13px;color:var(--violet-600);">Info</b></div>
      <div class="token" style="margin-top: 6px;">#6E52F2</div>
      <div class="caption" style="margin-top: 2px;">Delay tag · AI</div>
    </div>
  </div>
</div></body></html>
