<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Motion · curves &amp; durations</div>
  <style>
    .motion-row { display: grid; grid-template-columns: 130px 1fr 200px; gap: 14px; align-items: center; }
    .motion-track { height: 36px; border-radius: 18px; background: var(--cream-100); position: relative; overflow: hidden; }
    .motion-dot { position: absolute; top: 6px; height: 24px; width: 24px; border-radius: 50%; background: var(--coral-500); animation-iteration-count: infinite; animation-duration: 3s; left: 6px; }
    .ease-out  .motion-dot { animation-name: m1; animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); }
    .ease-spring .motion-dot { animation-name: m1; animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
    .ease-in-out .motion-dot { animation-name: m1; animation-timing-function: cubic-bezier(0.65, 0, 0.35, 1); }
    @keyframes m1 { 0% { left: 6px; } 40% { left: calc(100% - 30px); } 60% { left: calc(100% - 30px); } 100% { left: 6px; } }
  </style>
  <div class="motion-row ease-out">
    <div style="font-family: var(--font-body); font-weight: 600;">ease-out</div>
    <div class="motion-track"><div class="motion-dot"></div></div>
    <div class="token">0.22, 1, 0.36, 1 · default</div>
  </div>
  <div class="motion-row ease-spring">
    <div style="font-family: var(--font-body); font-weight: 600;">ease-spring</div>
    <div class="motion-track"><div class="motion-dot"></div></div>
    <div class="token">0.34, 1.56, 0.64, 1 · celebrate</div>
  </div>
  <div class="motion-row ease-in-out">
    <div style="font-family: var(--font-body); font-weight: 600;">ease-in-out</div>
    <div class="motion-track"><div class="motion-dot"></div></div>
    <div class="token">0.65, 0, 0.35, 1 · scrub</div>
  </div>
  <div style="display: flex; gap: 18px; padding-top: 4px; border-top: 1px solid var(--line-1); margin-top: 4px;">
    <div><b style="font-family: var(--font-body); font-size: 14px;">140 ms</b> <span class="caption">state change</span></div>
    <div><b style="font-family: var(--font-body); font-size: 14px;">240 ms</b> <span class="caption">transition</span></div>
    <div><b style="font-family: var(--font-body); font-size: 14px;">420 ms</b> <span class="caption">page reveal</span></div>
  </div>
</div></body></html>
