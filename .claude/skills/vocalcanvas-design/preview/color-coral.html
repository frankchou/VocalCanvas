<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card tight">
  <div class="eyebrow">Coral sunset · primary brand</div>
  <div class="swatch-row">
    <div class="swatch on-light" style="background: var(--coral-50);"><div class="name">50</div><div class="hex">#FFF1ED</div></div>
    <div class="swatch on-light" style="background: var(--coral-100);"><div class="name">100</div><div class="hex">#FFDCD0</div></div>
    <div class="swatch on-light" style="background: var(--coral-200);"><div class="name">200</div><div class="hex">#FFB8A1</div></div>
    <div class="swatch on-light" style="background: var(--coral-300);"><div class="name">300</div><div class="hex">#FF9377</div></div>
    <div class="swatch" style="background: var(--coral-400);"><div class="name">400</div><div class="hex">#FF7558</div></div>
    <div class="swatch" style="background: var(--coral-500); outline: 3px solid var(--ink-800); outline-offset: -3px;"><div class="name">500 ★</div><div class="hex">#FF5A3C</div></div>
    <div class="swatch" style="background: var(--coral-600);"><div class="name">600</div><div class="hex">#E94320</div></div>
    <div class="swatch" style="background: var(--coral-700);"><div class="name">700</div><div class="hex">#BF3015</div></div>
    <div class="swatch" style="background: var(--coral-800);"><div class="name">800</div><div class="hex">#8B2210</div></div>
    <div class="swatch" style="background: var(--coral-900);"><div class="name">900</div><div class="hex">#5C160A</div></div>
  </div>
  <div class="caption">★ 500 is the brand primary — buttons, waveforms, accents. Use 100 for soft backgrounds, 600 for hover, 700+ for text on cream.</div>
</div></body></html>
