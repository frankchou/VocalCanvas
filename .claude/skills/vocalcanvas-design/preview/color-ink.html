<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card tight">
  <div class="eyebrow">Ink · midnight canvas</div>
  <div class="swatch-row">
    <div class="swatch on-light" style="background: var(--ink-50);"><div class="name">50</div><div class="hex">#F6F5F2</div></div>
    <div class="swatch on-light" style="background: var(--ink-100);"><div class="name">100</div><div class="hex">#E9E7E0</div></div>
    <div class="swatch on-light" style="background: var(--ink-200);"><div class="name">200</div><div class="hex">#CFCBBF</div></div>
    <div class="swatch on-light" style="background: var(--ink-300);"><div class="name">300</div><div class="hex">#9C9789</div></div>
    <div class="swatch" style="background: var(--ink-400);"><div class="name">400</div><div class="hex">#6C6757</div></div>
    <div class="swatch" style="background: var(--ink-500);"><div class="name">500</div><div class="hex">#3F3B30</div></div>
    <div class="swatch" style="background: var(--ink-600);"><div class="name">600</div><div class="hex">#2A271F</div></div>
    <div class="swatch" style="background: var(--ink-700); outline: 3px solid var(--coral-500); outline-offset: -3px;"><div class="name">700 ★</div><div class="hex">#1A1813</div></div>
    <div class="swatch" style="background: var(--ink-800);"><div class="name">800</div><div class="hex">#0F0E0A</div></div>
    <div class="swatch" style="background: var(--ink-900);"><div class="name">900</div><div class="hex">#07070A</div></div>
  </div>
  <div class="caption">A warm black scale (slight brown tint). ★ 700 is the "canvas" dark surface. 800 is body text on cream.</div>
</div></body></html>
