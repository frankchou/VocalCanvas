<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Buttons</div>
  <style>
    .btn { font-family: var(--font-body); font-weight: 600; font-size: 15px; padding: 12px 22px; border-radius: var(--r-pill); border: 0; cursor: pointer; transition: all 140ms var(--ease-out); display: inline-flex; align-items: center; gap: 8px; letter-spacing: -0.005em; }
    .btn-primary { background: var(--coral-500); color: #fff; box-shadow: var(--shadow-glow); }
    .btn-primary:hover { background: var(--coral-600); transform: translateY(-1px); }
    .btn-render { background: var(--grad-sunset); color: #fff; box-shadow: var(--shadow-glow); }
    .btn-secondary { background: var(--ink-800); color: var(--cream-50); }
    .btn-secondary:hover { background: var(--ink-700); }
    .btn-ghost { background: transparent; color: var(--fg-1); border: 1px solid var(--line-2); }
    .btn-ghost:hover { background: var(--cream-100); }
    .btn-danger { background: var(--danger-soft); color: var(--danger); }
    .btn-sm { padding: 8px 14px; font-size: 13px; }
    .btn-lg { padding: 14px 26px; font-size: 16px; }
    .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
  <div class="flex-row">
    <button class="btn btn-render"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12m-4-4l4 4 4-4M5 21h14"/></svg>Render audio</button>
    <button class="btn btn-primary">Save to library</button>
    <button class="btn btn-secondary">Preview</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger">Delete</button>
  </div>
  <div class="flex-row">
    <button class="btn btn-primary btn-lg">Large · 16px</button>
    <button class="btn btn-primary">Default · 15px</button>
    <button class="btn btn-primary btn-sm">Small · 13px</button>
    <button class="btn btn-primary" disabled style="opacity: 0.4; cursor: not-allowed; box-shadow: none;">Disabled</button>
  </div>
  <div class="caption">Pill shape by default. Render uses the sunset gradient + coral glow. Secondary = ink-800. Ghost = bordered. Never opacity-fade on hover — use a deeper coral.</div>
</div></body></html>
