<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card tight">
  <div class="eyebrow">Cool accents · electric mint · AI violet</div>
  <div style="font-family: var(--font-body); font-size: 12px; color: var(--fg-2);">Mint — future, success, "AI working"</div>
  <div class="swatch-row" style="margin-top: -8px;">
    <div class="swatch on-light" style="background: var(--mint-50);"><div class="name">mint-50</div><div class="hex">#E6FBF4</div></div>
    <div class="swatch on-light" style="background: var(--mint-100);"><div class="name">100</div><div class="hex">#C6F4E3</div></div>
    <div class="swatch on-light" style="background: var(--mint-300);"><div class="name">300</div><div class="hex">#7AE5C0</div></div>
    <div class="swatch" style="background: var(--mint-400);"><div class="name">400</div><div class="hex">#4ED9A8</div></div>
    <div class="swatch" style="background: var(--mint-500);"><div class="name">500 ★</div><div class="hex">#1FC68C</div></div>
    <div class="swatch" style="background: var(--mint-600);"><div class="name">600</div><div class="hex">#0FA873</div></div>
  </div>
  <div style="font-family: var(--font-body); font-size: 12px; color: var(--fg-2);">Violet — AI semantics, info, male-voice chip, delay tag</div>
  <div class="swatch-row" style="margin-top: -8px;">
    <div class="swatch on-light" style="background: var(--violet-300);"><div class="name">violet-300</div><div class="hex">#B49CFF</div></div>
    <div class="swatch" style="background: var(--violet-400);"><div class="name">400</div><div class="hex">#8E75FF</div></div>
    <div class="swatch" style="background: var(--violet-500);"><div class="name">500 ★</div><div class="hex">#6E52F2</div></div>
    <div class="swatch" style="background: var(--violet-600);"><div class="name">600</div><div class="hex">#5239D1</div></div>
  </div>
</div></body></html>
