<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Script editor · inline delay tags</div>
  <div style="background: #fff; border: 1px solid var(--line-2); border-radius: 16px; padding: 18px 20px; font-family: var(--font-body); font-size: 16px; line-height: 1.85; color: var(--ink-800);">
    歡迎來到 VocalCanvas。<span class="tag-delay">&lt;delay 0.8s&gt;</span> 在這裡，每段文字都能擁有自己的聲音。<span class="tag-delay">&lt;delay 1.2s&gt;</span> 試著挑一個聲音，調整你想要的音色 — <span class="tag-delay">&lt;delay 0.5s&gt;</span> 然後讓 AI 為你朗讀。
  </div>
  <div style="display: flex; gap: 10px; align-items: center;">
    <button style="font-family: var(--font-body); font-weight: 600; font-size: 13px; padding: 8px 14px; border-radius: var(--r-pill); border: 1px dashed var(--violet-400); color: var(--violet-600); background: var(--info-soft); cursor: pointer;">+ 插入停頓 · Insert pause</button>
    <span class="caption">Cursor position dictates where the tag drops. Click any tag to edit seconds inline.</span>
  </div>
</div></body></html>
